services:
  app:
    build: .
    ports:
      - "${APP_PORT:-5173}:5173"
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules

volumes:
  node_modules_data:
